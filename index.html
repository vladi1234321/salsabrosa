<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salsabrosa</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, #7f1d1d 0%, transparent 35%),
        linear-gradient(to bottom, #09090b, #18181b);
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
    }

    .container {
      max-width: 800px;
    }

    .tag {
      display: inline-block;
      padding: 10px 18px;
      border: 1px solid #ef4444;
      border-radius: 999px;
      color: #fecaca;
      margin-bottom: 30px;
      font-size: 14px;
    }

    h1 {
      font-size: clamp(60px, 12vw, 140px);
      margin: 0;
      font-weight: 900;
      letter-spacing: -5px;
    }

    h1 span {
      color: #ef4444;
    }

    p {
      font-size: 24px;
      color: #d4d4d8;
      line-height: 1.5;
    }

    a {
      color: #ef4444;
      text-decoration: none;
      font-weight: bold;
    }

    .footer {
      margin-top: 40px;
      color: #71717a;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="tag">
      Mexican hot sauce culture from Berlin
    </div>

    <h1>
      SALSA<span>BROSA</span>
    </h1>

    <p>
      Small-batch Mexican inspired sauces.<br>
      Smoke, heat, acidity and serious flavor.
    </p>

    <p>
      Coming soon.
    </p>

    <p>
      <a href="https://www.instagram.com/salsabrosa.de/">
        @salsabrosa.de
      </a>
    </p>

    <div class="footer">
      salsabrosa.de • Berlin • 2026
    </div>

  </div>

</body>
</html>
